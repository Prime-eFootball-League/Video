/* ---------------------------------------------------------------------- */

/* ---------------------------------------------------------------------- */
const PERSONAS = [
  { id: "theo", name: "Tactical Theo", tag: "Sharp · Analytical · Opinionated",
    system: "Tactical Theo: a sharp, analytical football host who breaks down decisions like a tactics board. Precise vocabulary, references formations, rules and patterns of play, but never sits on the fence — always lands on a hard, personal verdict." },
  { id: "marcus", name: "Coach Marcus", tag: "Direct · Aggressive · Ex-Coach",
    system: "Coach Marcus: a former coach turned host. Blunt, physical, dressing-room energy. Short punchy sentences, coaching-clichés used sincerely, zero patience for excuses, and a verdict delivered like a team-talk." },
];

const MODES = [
  { id: "var", name: "Referee/VAR Controversy", isXI: false },
  { id: "prediction_xi", name: "Pre-Match Prediction & Starting XI", isXI: true },
  { id: "postmatch", name: "Post-Match Formation & Performance Breakdown", isXI: false },
  { id: "ultimate_xi", name: "Ultimate XI Selection (World Cup / UCL / League Starts)", isXI: true },
];

const DURATIONS = [60, 90, 120, 180];

const VOICES = [
  { id: "en-GB-RyanNeural", name: "Ryan (British, sharp pundit)" },
  { id: "en-US-ChristopherNeural", name: "Christopher (US, hyped sports)" },
  { id: "en-GB-ThomasNeural", name: "Thomas (British, calm authority)" },
  { id: "en-US-EricNeural", name: "Eric (US, gravel & grit)" },
];

const TRUSTED_CLIENT_TOKEN = "6A5AA1D4EAFF4E9FB37E23D68491D6F4";
const STORAGE_KEY = "matchday_voice_gemini_key";

/* ---------------------------------------------------------------------- */
/*  HELPERS                                                                */
/* ---------------------------------------------------------------------- */
async function sha256Hex(input) {
  const enc = new TextEncoder().encode(input);
  const digest = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("").toUpperCase();
}
async function generateSecMsGec() {
  const WIN_EPOCH = 11644473600;
  let ticks = Date.now() / 1000 + WIN_EPOCH;
  ticks -= ticks % 300;
  ticks *= 1e7;
  return sha256Hex(`${Math.floor(ticks)}${TRUSTED_CLIENT_TOKEN}`);
}
function escapeSsml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function wordCount(str) {
  const t = str.trim();
  return t.length === 0 ? 0 : t.split(/\s+/).length;
}
function safeLocalStorageGet(key) {
  try { return localStorage.getItem(key); } catch { return null; }
}
function safeLocalStorageSet(key, val) {
  try { localStorage.setItem(key, val); return true; } catch { return false; }
}

/*  UI PRIMITIVES                                                          */
/* ---------------------------------------------------------------------- */

}
function CardHeader({ step, title, subtitle, icon: IconComp }) {
  return (

      <div className="flex items-center justify-center w-8 h-8 rounded-full border border-[#39FF6E]/40 text-[#39FF6E] text-sm font-bold shrink-0" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{step}</div>
      <div className="min-w-0">
        <h2 className="text-[#EAF6EE] text-lg leading-tight tracking-wide uppercase" style={{ fontFamily: "'Oswald', sans-serif" }}>{title}</h2>
        <p className="text-[#7FA88E] text-xs mt-0.5">{subtitle}</p>
      </div>
      {IconComp && <IconComp className="w-5 h-5 text-[#39FF6E]/60 ml-auto shrink-0" />}
    </div>
  );
}
function Label({ children }) {
  return <label className="block text-[11px] font-semibold uppercase tracking-wider text-[#7FA88E] mb-1.5">{children}</label>;
}
function Select({ value, onChange, options, getLabel, getValue }) {
  return (
    <div className="relative">
      <select value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full appearance-none bg-[#102819] border border-[#1E4430] text-[#EAF6EE] text-sm rounded-lg px-3 py-2.5 pr-9 focus:outline-none focus:ring-2 focus:ring-[#39FF6E]/50 focus:border-[#39FF6E]/50 transition">
        {options.map(o => <option key={getValue(o)} value={getValue(o)}>{getLabel(o)}</option>)}
      </select>
      <ChevronDown className="w-4 h-4 text-[#7FA88E] absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" />
    </div>
  );
}

/* ---------------------------------------------------------------------- */
/*  PROMPT BUILDER                                                         */
/* ---------------------------------------------------------------------- */
const MODE_COPY = {
  var: {
    analysisInstruction: "Break down the incident: the letter of the law, what the officials saw (or missed), and how it compares to similar recent decisions. Present both sides fairly before judging.",
    verdictInstruction: "Take a clear, strong, opinionated personal stance on the decision. Not neutral. Commit hard and defend it in one or two closing lines.",
  },
  prediction_xi: {
    analysisInstruction: "Break down recent form, key injuries/suspensions, and head-to-head or tactical factors for both sides, then reason through your starting XI selection for the featured team — formation, key match-ups, and why each big call was made.",
    verdictInstruction: "Lock in a confident, bold predicted scoreline AND your predicted Starting XI, delivered with total conviction. Passionately defend your most debatable selection, and explicitly name one controversial omission from the XI — a player fans will be angry you left out — and justify why they didn't make the cut.",
  },
  postmatch: {
    analysisInstruction: "Break down how the formation actually played out — shape in and out of possession, the tactical shift(s) that mattered, and which individual performances swung the game, using any stats/details provided.",
    verdictInstruction: "Take a clear, strong, opinionated stance on who won and lost the tactical battle and who the standout/worst performer was. Not neutral. Commit hard and defend it in one or two closing lines.",
  },
  ultimate_xi: {
    analysisInstruction: "Reason through the Ultimate XI selection criteria — the tournament/competition context, the formation chosen, and how the players under consideration stack up against each other position by position.",
    verdictInstruction: "Reveal and passionately defend your final Ultimate XI, position by position, with total conviction. Explicitly name one controversial omission — a big-name player left out — and justify why they didn't make the cut.",
  },
};

function buildPrompt({ personaObj, modeObj, duration, teamDetails, tacticalContext }) {
  const hookEnd = Math.round(duration * 0.16);
  const analysisEnd = Math.round(duration * 0.58);
  const copy = MODE_COPY[modeObj.id];

  return `You are writing a spoken, first-person video script for a football (soccer) content creator.

HOST PERSONA: ${personaObj.system}

CONTENT MODE: ${modeObj.name}
TARGET LENGTH: ${duration} seconds (~${Math.round((duration / 60) * 150)} words)

TEAM / MATCH DETAILS:
${teamDetails}

${tacticalContext.trim() ? `TACTICAL CONTEXT / LINEUP DETAILS (formations, player stats, squad or tournament selections to compare):\n${tacticalContext}\n` : ""}
Write the script in exactly three labelled sections, spoken in first person, camera-facing, natural spoken rhythm (short sentences, contractions, no stage directions except the bracketed labels below):

[The Hook] (0-${hookEnd}s)
Dynamic catch. Grab attention immediately — no throat-clearing, no "hey guys" — open mid-thought or with a bold claim.

[Tactical / Stat Analysis] (${hookEnd}-${analysisEnd}s)
${copy.analysisInstruction}

[My Opinionated Verdict] (${analysisEnd}-${duration}s)
${copy.verdictInstruction}

Output ONLY the script text with the three bracketed section headers exactly as shown above, nothing else — no preamble, no notes.`;
}

/* ---------------------------------------------------------------------- */
/*  MAIN APP                                                               */
/* ---------------------------------------------------------------------- */
function App() {
  const [apiKey, setApiKey] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [keyInput, setKeyInput] = useState("");
  const [storageWarning, setStorageWarning] = useState(false);

  useEffect(() => {
    const saved = safeLocalStorageGet(STORAGE_KEY);
    if (saved) setApiKey(saved);
  }, []);

  function saveApiKey() {
    setApiKey(keyInput.trim());
    const ok = safeLocalStorageSet(STORAGE_KEY, keyInput.trim());
    setStorageWarning(!ok);
    setShowSettings(false);
  }

  const [persona, setPersona] = useState(PERSONAS[0].id);
  const [mode, setMode] = useState(MODES[0].id);
  const [duration, setDuration] = useState(90);
  const [teamDetails, setTeamDetails] = useState("");
  const [tacticalContext, setTacticalContext] = useState("");
  const [isDrafting, setIsDrafting] = useState(false);
  const [draftError, setDraftError] = useState("");

  const [script, setScript] = useState("");
  const hasScript = script.trim().length > 0;
  const words = useMemo(() => wordCount(script), [script]);
  const chars = script.length;
  const estSeconds = Math.round((words / 150) * 60);

  const [voice, setVoice] = useState(VOICES[0].id);
  const [rate, setRate] = useState(0);
  const [isGeneratingAudio, setIsGeneratingAudio] = useState(false);
  const [audioUrl, setAudioUrl] = useState("");
  const [audioError, setAudioError] = useState("");
  const [ttsProgress, setTtsProgress] = useState("");
  const audioRef = useRef(null);
  const [isPlaying, setIsPlaying] = useState(false);

  const currentModeObj = MODES.find(m => m.id === mode);

  async function draftScript() {
    setDraftError("");
    if (!apiKey) { setShowSettings(true); setDraftError("Add your Gemini API key first."); return; }
    if (!teamDetails.trim()) { setDraftError("Add the team/match details first."); return; }

    setIsDrafting(true);
    const personaObj = PERSONAS.find(p => p.id === persona);
    const prompt = buildPrompt({ personaObj, modeObj: currentModeObj, duration, teamDetails, tacticalContext });

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
      });
      if (!res.ok) {
        const errBody = await res.text();
        throw new Error(`Gemini API error (${res.status}): ${errBody.slice(0, 200)}`);
      }
      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.map(p => p.text).join("") || "";
      if (!text.trim()) throw new Error("Gemini returned an empty script.");
      setScript(text.trim());
      setAudioUrl("");
      setAudioError("");
    } catch (err) {
      setDraftError(err.message || "Something went wrong drafting the script.");
    } finally {
      setIsDrafting(false);
    }
  }

  async function generateVoiceover() {
    setAudioError(""); setAudioUrl(""); setIsGeneratingAudio(true);
    setTtsProgress("Connecting to voice service…");
    try {
      const secMsGec = await generateSecMsGec();
      const connectionId = crypto.randomUUID().replace(/-/g, "");
      const wsUrl = `wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?TrustedClientToken=${TRUSTED_CLIENT_TOKEN}&Sec-MS-GEC=${secMsGec}&Sec-MS-GEC-Version=1-131.0.2903.51&ConnectionId=${connectionId}`;

      const audioBlob = await new Promise((resolve, reject) => {
        const chunks = [];
        let settled = false;
        const ws = new WebSocket(wsUrl);
        ws.binaryType = "arraybuffer";
        const timeout = setTimeout(() => {
          if (!settled) { settled = true; ws.close(); reject(new Error("Timed out waiting for the voice service to respond.")); }
        }, 12000);

        ws.onopen = () => {
          setTtsProgress("Synthesizing audio…");
          const ts = new Date().toISOString();
          const configMsg = `X-Timestamp:${ts}\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n` +
            JSON.stringify({ context: { synthesis: { audio: { metadataoptions: { sentenceBoundaryEnabled: false, wordBoundaryEnabled: false }, outputFormat: "audio-24khz-48kbitrate-mono-mp3" } } } });
          ws.send(configMsg);

          const reqId = crypto.randomUUID().replace(/-/g, "");
          const ratePct = `${rate >= 0 ? "+" : ""}${rate}%`;
          const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='en-US'><voice name='${voice}'><prosody rate='${ratePct}' pitch='0%'>${escapeSsml(script)}</prosody></voice></speak>`;
          const ssmlMsg = `X-RequestId:${reqId}\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:${ts}\r\nPath:ssml\r\n\r\n${ssml}`;
          ws.send(ssmlMsg);
        };

        ws.onmessage = (event) => {
          if (typeof event.data === "string") {
            if (event.data.includes("Path:turn.end")) {
              settled = true; clearTimeout(timeout); ws.close();
              resolve(new Blob(chunks, { type: "audio/mpeg" }));
            }
          } else {
            const buf = new Uint8Array(event.data);
            const headerLen = (buf[0] << 8) | buf[1];
            chunks.push(buf.slice(2 + headerLen));
          }
        };
        ws.onerror = () => { if (!settled) { settled = true; clearTimeout(timeout); reject(new Error("Could not reach the free voice service from this environment.")); } };
        ws.onclose = () => { if (!settled) { settled = true; clearTimeout(timeout); reject(new Error("Connection closed before audio finished generating.")); } };
      });

      if (audioBlob.size === 0) throw new Error("No audio data was returned.");
      setAudioUrl(URL.createObjectURL(audioBlob));
      setTtsProgress("");
    } catch (err) {
      setAudioError(err.message || "Voice generation failed.");
      setTtsProgress("");
    } finally {
      setIsGeneratingAudio(false);
    }
  }

  function togglePlay() {
    if (!audioRef.current) return;
    if (isPlaying) audioRef.current.pause(); else audioRef.current.play();
  }

  return (
    <div className="min-h-screen w-full bg-[#050B08] text-[#EAF6EE]">
      <div className="pointer-events-none fixed inset-0 opacity-[0.05]" style={{ backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 38px, #39FF6E 38px, #39FF6E 39px)" }} />

      <header className="relative border-b border-[#1E4430] bg-[#06120C]/80 backdrop-blur">
        <div className="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-full border-2 border-[#39FF6E] flex items-center justify-center"><Flag className="w-4 h-4 text-[#39FF6E]" /></div>
            <div>
              <h1 className="text-xl uppercase tracking-wide leading-none" style={{ fontFamily: "'Oswald', sans-serif" }}>Matchday Voice<span className="text-[#39FF6E]">.</span></h1>
              <p className="text-[11px] text-[#7FA88E] mt-0.5">Host script &amp; voiceover generator</p>
            </div>
          </div>
          <button onClick={() => { setKeyInput(apiKey); setShowSettings(s => !s); }}
            className="flex items-center gap-2 text-xs font-medium border border-[#1E4430] hover:border-[#39FF6E]/50 rounded-lg px-3 py-2 transition text-[#7FA88E] hover:text-[#EAF6EE]">
            <Settings className="w-3.5 h-3.5" />{apiKey ? "API key saved" : "Add API key"}
          </button>
        </div>

        {showSettings && (
          <div className="max-w-7xl mx-auto px-5 pb-4">
            <div className="bg-[#0B1B13] border border-[#1E4430] rounded-xl p-4 flex flex-col sm:flex-row gap-3 sm:items-end">
              <div className="flex-1">
                <Label>Gemini API key</Label>
                <div className="relative">
                  <KeyRound className="w-3.5 h-3.5 text-[#7FA88E] absolute left-3 top-1/2 -translate-y-1/2" />
                  <input type="password" value={keyInput} onChange={(e) => setKeyInput(e.target.value)} placeholder="AIza…"
                    className="w-full bg-[#102819] border border-[#1E4430] rounded-lg pl-8 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#39FF6E]/50" />
                </div>
                <p className="text-[11px] text-[#7FA88E] mt-1.5">Saved to your browser's local storage on this device only — never sent anywhere except directly to Google's API.</p>
              </div>
              <button onClick={saveApiKey} className="bg-[#39FF6E] text-[#06120C] font-semibold text-sm rounded-lg px-4 py-2.5 hover:brightness-110 transition shrink-0">Save key</button>
            </div>
            {storageWarning && (
              <p className="text-[11px] text-[#FF9B8F] mt-2">This browser blocked local storage (e.g. private/incognito mode) — your key will still work for this session, just won't persist after you close the tab.</p>
            )}
          </div>
        )}
      </header>

      <main className="max-w-7xl mx-auto px-5 py-6 grid grid-cols-1 lg:grid-cols-3 gap-5">
        <Card>
          <CardHeader step="1" title="Set the Stage" subtitle="Configure host, mode & input" icon={Radio} />
          <div className="p-5 space-y-4">
            <div>
              <Label>Host persona</Label>
              <Select value={persona} onChange={setPersona} options={PERSONAS} getValue={p => p.id} getLabel={p => p.name} />
              <p className="text-[11px] text-[#7FA88E] mt-1.5">{PERSONAS.find(p => p.id === persona).tag}</p>
            </div>

            <div>
              <Label>Content mode</Label>
              <Select value={mode} onChange={setMode} options={MODES} getValue={m => m.id} getLabel={m => m.name} />
              {currentModeObj.isXI && (
                <p className="text-[11px] text-[#39FF6E] mt-1.5 flex items-start gap-1.5">
                  <Users className="w-3 h-3 mt-0.5 shrink-0" />
                  Host will pick a full XI and must name one controversial omission.
                </p>
              )}
            </div>

            <div>
              <div className="flex items-center justify-between mb-1.5">
                <Label>Target duration</Label>
                <span className="text-[#39FF6E] text-sm font-bold px-2 py-0.5 rounded bg-[#39FF6E]/10 border border-[#39FF6E]/30" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                  {String(Math.floor(duration / 60)).padStart(2, "0")}:{String(duration % 60).padStart(2, "0")}
                </span>
              </div>
              <input type="range" min={0} max={DURATIONS.length - 1} step={1} value={DURATIONS.indexOf(duration)}
                onChange={(e) => setDuration(DURATIONS[Number(e.target.value)])} className="w-full" />
              <div className="flex justify-between text-[10px] text-[#7FA88E] mt-1">{DURATIONS.map(d => <span key={d}>{d}s</span>)}</div>
            </div>

            <div>
              <Label>Team / match details</Label>
              <textarea value={teamDetails} onChange={(e) => setTeamDetails(e.target.value)} rows={4}
                placeholder="Team names, tournament context, and specific players — e.g. Argentina vs France, World Cup Final, focus on Mbappé vs Argentina's back line…"
                className="w-full bg-[#102819] border border-[#1E4430] rounded-lg px-3 py-2.5 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-[#39FF6E]/50 placeholder:text-[#4A6B58]" />
            </div>

            <div>
              <Label>Tactical context / lineup details (optional)</Label>
              <textarea value={tacticalContext} onChange={(e) => setTacticalContext(e.target.value)} rows={3}
                placeholder="Formations, player stats, or the specific squad/tournament selections to compare…"
                className="w-full bg-[#102819] border border-[#1E4430] rounded-lg px-3 py-2.5 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-[#39FF6E]/50 placeholder:text-[#4A6B58]" />
            </div>

            {draftError && (
              <div className="flex items-start gap-2 text-xs text-[#FF9B8F] bg-[#3A140F]/40 border border-[#5A231A] rounded-lg px-3 py-2.5">
                <AlertTriangle className="w-3.5 h-3.5 shrink-0 mt-0.5" /><span>{draftError}</span>
              </div>
            )}

            <button onClick={draftScript} disabled={isDrafting}
              className="w-full flex items-center justify-center gap-2 bg-[#39FF6E] disabled:bg-[#1E4430] disabled:text-[#7FA88E] text-[#06120C] font-semibold text-sm rounded-lg py-3 hover:brightness-110 transition">
              {isDrafting ? <Loader2 className="w-4 h-4 spin" /> : <Zap className="w-4 h-4" />}
              {isDrafting ? "Drafting…" : "1. Draft Script"}
            </button>
          </div>
        </Card>

        <Card locked={!hasScript}>
          <CardHeader step="2" title="Script Sandbox" subtitle="Edit freely before recording" icon={TypeIco} />
          <div className="p-5">
            {!hasScript ? (
              <div className="h-72 flex flex-col items-center justify-center text-center text-[#4A6B58] border border-dashed border-[#1E4430] rounded-xl">
                <Mic className="w-6 h-6 mb-2 opacity-50" />
                <p className="text-sm">The pitch is empty.</p>
                <p className="text-xs mt-1">Draft a script on the left to unlock editing.</p>
              </div>
            ) : (
              <React.Fragment>
                <textarea value={script} onChange={(e) => { setScript(e.target.value); setAudioUrl(""); }} rows={16}
                  className="w-full bg-[#0D1F16] border border-[#1E4430] rounded-lg px-3.5 py-3 text-[13.5px] leading-relaxed resize-none focus:outline-none focus:ring-2 focus:ring-[#39FF6E]/40"
                  style={{ fontFamily: "'JetBrains Mono', monospace" }} />
                <div className="flex flex-wrap items-center gap-x-4 gap-y-1 mt-3 text-[11px] text-[#7FA88E]" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                  <span className="flex items-center gap-1.5"><TypeIco className="w-3 h-3" /> {words} words</span>
                  <span>{chars} chars</span>
                  <span className="flex items-center gap-1.5 ml-auto text-[#39FF6E]"><Clock className="w-3 h-3" /> ~{estSeconds}s read</span>
                </div>
              </React.Fragment>
            )}
          </div>
        </Card>

        <Card locked={!hasScript}>
          <CardHeader step="3" title="Voice Generator" subtitle="Free client-side text-to-speech" icon={Volume2} />
          <div className="p-5 space-y-4">
            <div>
              <Label>Voice</Label>
              <Select value={voice} onChange={setVoice} options={VOICES} getValue={v => v.id} getLabel={v => v.name} />
            </div>

            <div>
              <div className="flex items-center justify-between mb-1.5">
                <Label>Speech rate</Label>
                <span className="text-[#39FF6E] text-sm font-bold" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{rate >= 0 ? "+" : ""}{rate}%</span>
              </div>
              <input type="range" min={-10} max={15} step={1} value={rate} onChange={(e) => setRate(Number(e.target.value))} className="w-full" disabled={!hasScript} />
            </div>

            {audioError && (
              <div className="flex items-start gap-2 text-xs text-[#FF9B8F] bg-[#3A140F]/40 border border-[#5A231A] rounded-lg px-3 py-2.5">
                <AlertTriangle className="w-3.5 h-3.5 shrink-0 mt-0.5" />
                <span>{audioError} If this keeps failing, your network or browser may be blocking the websocket to Microsoft's free voice endpoint.</span>
              </div>
            )}

            <button onClick={generateVoiceover} disabled={!hasScript || isGeneratingAudio}
              className="w-full flex items-center justify-center gap-2 bg-[#39FF6E] disabled:bg-[#1E4430] disabled:text-[#7FA88E] text-[#06120C] font-semibold text-sm rounded-lg py-3 hover:brightness-110 transition">
              {isGeneratingAudio ? <Loader2 className="w-4 h-4 spin" /> : <Mic className="w-4 h-4" />}
              {isGeneratingAudio ? (ttsProgress || "Generating…") : "2. Generate Voiceover"}
            </button>

            {audioUrl && (
              <div className="border border-[#1E4430] rounded-xl p-4 bg-[#0D1F16] space-y-3">
                <audio ref={audioRef} src={audioUrl} onPlay={() => setIsPlaying(true)} onPause={() => setIsPlaying(false)} onEnded={() => setIsPlaying(false)} className="hidden" />
                <div className="flex items-center gap-3">
                  <button onClick={togglePlay} className="w-10 h-10 rounded-full bg-[#39FF6E] text-[#06120C] flex items-center justify-center shrink-0 hover:brightness-110 transition">
                    {isPlaying ? <Pause className="w-4 h-4" /> : <Play className="w-4 h-4 ml-0.5" />}
                  </button>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-medium truncate">Voiceover ready</p>
                    <p className="text-[11px] text-[#7FA88E]">{VOICES.find(v => v.id === voice)?.name}</p>
                  </div>
                  <Check className="w-4 h-4 text-[#39FF6E] shrink-0" />
                </div>
                <a href={audioUrl} download="matchday-voiceover.mp3"
                  className="w-full flex items-center justify-center gap-2 border border-[#39FF6E]/40 text-[#39FF6E] text-sm font-semibold rounded-lg py-2.5 hover:bg-[#39FF6E]/10 transition">
                  <Download className="w-4 h-4" />Download Voiceover MP3
                </a>
              </div>
            )}
          </div>
        </Card>
      </main>

      <footer className="max-w-7xl mx-auto px-5 pb-8 pt-2 text-center text-[11px] text-[#4A6B58]">
        Runs entirely in your browser · Gemini key stored locally on your device · No backend, no fees
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
